<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>monitronica</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .center {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    h1 {
      font-size: 3em;
      letter-spacing: 10px;
      font-weight: 300;
    }

    .disclaimer {
      position: absolute;
      bottom: 20px;
      font-size: 0.7em;
      color: #777;
    }
  </style>
</head>
<body>

  <canvas id="trail"></canvas>

  <div class="center">
    <h1>monitronica</h1>
    <div class="disclaimer">This is a personal project space.</div>
  </div>

  <script>
    const canvas = document.getElementById("trail");
    const ctx = canvas.getContext("2d");

    let points = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resize);
    resize();

    window.addEventListener("mousemove", (e) => {
      points.push({
        x: e.clientX,
        y: e.clientY,
        life: 1
      });
    });

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = 1; i < points.length; i++) {
        const p1 = points[i - 1];
        const p2 = points[i];

        ctx.strokeStyle = `rgba(255,255,255,${p2.life})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();

        p1.life -= 0.015;
      }

      points = points.filter(p => p.life > 0);

      requestAnimationFrame(draw);
    }

    draw();
  </script>

</body>
</html>
